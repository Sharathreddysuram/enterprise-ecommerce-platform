services:

  mysql:
    image: mysql:8
    container_name: ecommerce-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 3105@Goutami
      MYSQL_DATABASE: product_db

  service-registry:
    image: service-registry
    container_name: service-registry
    ports:
      - "8761:8761"

  config-server:
    image: config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - service-registry

  api-gateway:
    image: api-gateway
    container_name: api-gateway
    ports:
      - "9090:9090"
    depends_on:
      - service-registry
      - config-server

  product-service:
    image: product-service
    container_name: product-service
    ports:
      - "9996:8081"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      - mysql
      - service-registry
      - config-server
    restart: on-failure

  order-service:
    image: order-service
    container_name: order-service
    ports:
      - "9995:8082"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      - mysql
      - service-registry
      - config-server
      - product-service

  payment-service:
    image: payment-service
    container_name: payment-service
    ports:
      - "9994:8083"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      - mysql
      - service-registry
      - config-server
    restart: on-failure